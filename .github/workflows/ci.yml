# =============================================================================
# .github/workflows/ci.yml
#
# CI workflow for the ci-multiprofiler repository itself.
#
# Builds and profiles the dummy application in test/ to verify that the
# profiling framework (Profiling.cmake + action.yml) works end-to-end
# for every supported back-end.
# =============================================================================
name: 'CI'

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: 'Integration test (${{ matrix.profiling_tool }})'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profiling_tool: [gprof, hpctoolkit, scalasca]

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Run profiling action on test app
        uses: ./
        with:
          profiling_tool: ${{ matrix.profiling_tool }}
          source_dir: 'test'
          build_dir: 'build'
          cmake_args: '-DCI_MODE=ON -DPROFILING_ANALYSIS=ON'
          artifact_retention_days: '3'

      - name: Validate analysis reports
        shell: bash
        run: |
          RESULTS_DIR="build/profiling-results"
          TOOL="${{ matrix.profiling_tool }}"

          check() {
            # check <description> <find-args...>
            local desc="$1"; shift
            mapfile -t hits < <(find "$RESULTS_DIR" "$@")
            if [[ ${#hits[@]} -eq 0 ]]; then
              echo "ERROR: $desc — none found under $RESULTS_DIR"
              exit 1
            fi
            echo "OK ($desc): found ${#hits[@]} match(es):"
            printf '  %s\n' "${hits[@]}"
          }

          if [[ "$TOOL" == "gprof" ]]; then
            # <RESULTS_DIR>/<test_name>/gmon.<pid>  — written by glibc via GMON_OUT_PREFIX
            check "raw gmon.* in per-test dirs"      -maxdepth 2 -name 'gmon.*' -not -type d
            # <RESULTS_DIR>/<test_name>/gmon.<pid>.gprof_output.txt  — written by run_gprof_analysis.cmake
            check "gprof reports in per-test dirs"   -maxdepth 2 -name '*.gprof_output.txt'

          elif [[ "$TOOL" == "hpctoolkit" ]]; then
            # <RESULTS_DIR>/<test_name>/measurements/<sample>.hpcrun  — written by hpcrun
            check "hpcrun files in measurements/"    -path '*/measurements/*.hpcrun'
            # <RESULTS_DIR>/<test_name>/structs/<exe>.hpcstruct  — written by hpcstruct
            check "hpcstruct files in structs/"      -path '*/structs/*.hpcstruct'

          elif [[ "$TOOL" == "scalasca" ]]; then
            # <RESULTS_DIR>/<test_name>/scorep_archive/profile.cubex  — written by Score-P
            check "profile.cubex in scorep_archive/" -path '*/scorep_archive/profile.cubex'
            # <RESULTS_DIR>/<test_name>/scalasca_summary.txt  — written by scalasca -examine
            check "scalasca_summary.txt in per-test dirs" -maxdepth 2 -name 'scalasca_summary.txt'
          fi
